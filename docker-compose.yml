services:
  postgres:
    image: postgres:17-alpine
    container_name: hb-postgres
    environment:
      POSTGRES_DB: hbsite
      POSTGRES_USER: hbsite
      POSTGRES_PASSWORD: hbsite
    ports:
      - "5432:5432"
    volumes:
      - hb-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hbsite -d hbsite"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: hb-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  hb-pg-data:
